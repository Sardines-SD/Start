<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Public Dashboard</title>

  <link rel="stylesheet" href="styler.css">

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />
</head>

<body>
  
  <section class="public-dashboard-section">

  <h2>Public Service Delivery Dashboard</h2>
  <p class="section-subtitle">
    View municipal service delivery issues across Johannesburg wards.
  </p>
  <div class="top-bar">
    <button class="public-dashboard-btn" onclick="window.location.href='index.html'">
      ← Back to Login
    </button>
  </div>

  <!-- Statistics Cards -->
  <div class="stats-grid">
    <div class="stat-card">
      <h3 id="totalRequests">0</h3>
      <p>Total Requests</p>
    </div>

    <div class="stat-card">
      <h3 id="pendingRequests">0</h3>
      <p>Pending</p>
    </div>

    <div class="stat-card">
      <h3 id="inProgressRequests">0</h3>
      <p>In Progress</p>
    </div>

    <div class="stat-card">
      <h3 id="resolvedRequests">0</h3>
      <p>Resolved</p>
    </div>
  </div>

  <!-- Public Map -->
  <div id="publicMap"></div>

  <!-- Requests Table -->
  <div style="overflow-x:auto; margin-top: 30px;">
    <table>
      <thead>
        <tr>
          <th>Category</th>
          <th>Description</th>
          <th>Ward</th>
          <th>Municipality</th>
          <th>Status</th>
          <th>Date</th>
        </tr>
      </thead>

      <tbody id="publicRequestsTable"></tbody>
    </table>
  </div>

</section>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>


<script type="module" src="publicDashboard.js"></script>

</body>
</html>
