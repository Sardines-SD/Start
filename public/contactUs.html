<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Municipal Service Portal</title>
  <link rel="stylesheet" href="styler.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a2a3a 0%, #2b5fa8 100%);
      color: #fff;
    }

    .contact-header {
      background: rgba(0,0,0,0.3);
      padding: 60px 20px;
      text-align: center;
    }

    .contact-header h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .contact-card {
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 40px;
      backdrop-filter: blur(10px);
    }

    .contact-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 30px;
      margin-bottom: 20px;
    }

    .info-item {
      text-align: center;
      padding: 20px;
    }

    .info-icon {
      font-size: 40px;
      margin-bottom: 15px;
    }

    .info-item h3 {
      margin-bottom: 10px;
      color: #ffd700;
    }

    .back-btn {
      display: inline-block;
      margin-top: 30px;
      padding: 10px 25px;
      background: rgba(255,255,255,0.2);
      color: #fff;
      text-decoration: none;
      border-radius: 30px;
      transition: all 0.3s ease;
      text-align: center;
    }

    .back-btn:hover {
      background: rgba(255,255,255,0.3);
    }

    footer {
      text-align: center;
      padding: 30px;
      background: rgba(0,0,0,0.3);
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <div class="contact-header">
    <h1>Contact Us</h1>
    <p>Get in touch with us</p>
  </div>

  <div class="container">
    <div class="contact-card">
      <div class="contact-info">
        <div class="info-item">
          <div class="info-icon">📍</div>
          <h3>Address</h3>
          <p>123 Civic Center<br>Municipal Building<br>Johannesburg, 2000</p>
        </div>
        <div class="info-item">
          <div class="info-icon">📞</div>
          <h3>Phone</h3>
          <p>+27 (0)11 123 4567</p>
          <p>Mon-Fri 8am-5pm</p>
        </div>
        <div class="info-item">
          <div class="info-icon">✉️</div>
          <h3>Email</h3>
          <p>randyhollard23@gmail.com</p>
          <p>support@municipal.gov.za</p>
        </div>
      </div>

      <div style="text-align:center;">
        <a href="index.html" class="back-btn">← Back to Login</a>
      </div>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 Municipal Service Delivery Portal | Contact Us</p>
  </footer>
</body>
</html>
