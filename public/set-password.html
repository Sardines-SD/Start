<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set Password - Municipal Service Portal</title>
  <link rel="stylesheet" href="styler.css">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(135deg, #2b5fa8, #1a3f7a);
    }
    
    header {
      background: transparent;
      padding: 40px 20px 20px;
      text-align: center;
    }
    
    .header-brand h1 {
      color: white;
      font-size: 24px;
      margin-bottom: 10px;
    }
    
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .set-password-card {
      background: white;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      text-align: center;
    }
    
    .set-password-card h2 {
      color: #1a2a3a;
      margin-bottom: 15px;
      font-size: 24px;
    }
    
    .set-password-card p {
      color: #5a6e7c;
      margin-bottom: 25px;
      line-height: 1.5;
    }
    
    .set-password-card p strong {
      color: #2b5fa8;
    }
    
    .input-row {
      display: flex;
      align-items: center;
      background-color: #f5f8fc;
      border: 1px solid #c8d4e0;
      border-radius: 8px;
      margin-top: 10px;
      overflow: hidden;
    }
    
    .input-icon {
      padding: 0 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #eaeff8;
      border-right: 1px solid #c8d4e0;
      height: 48px;
      min-width: 48px;
    }
    
    .input-row input {
      border: none;
      background: transparent;
      padding: 12px 14px;
      font-size: 14px;
      color: #1a2a3a;
      outline: none;
      width: 100%;
    }
    
    .input-row input:focus {
      outline: none;
    }
    
    button {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: linear-gradient(135deg, #2b5fa8, #1a3f7a);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    button:hover {
      transform: translateY(-1px);
    }
    
    .back-link {
      display: block;
      margin-top: 15px;
      color: #6a84a0;
      text-decoration: none;
      font-size: 13px;
    }
    
    .back-link:hover {
      color: #2b5fa8;
    }
    
    .message {
      margin-top: 15px;
      padding: 10px;
      border-radius: 6px;
      font-size: 14px;
    }
    
    footer {
      text-align: center;
      padding: 20px;
      color: rgba(255,255,255,0.7);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-brand">
      <h1>Municipal Service Delivery<br>Reporting Portal</h1>
    </div>
  </header>
  
  <main>
    <div class="set-password-card">
      <h2>Set Password for Google Account</h2>
      <p>Your email <strong id="userEmail"></strong> is registered with Google.<br>Set a password to also log in with email/password.</p>
      
      <div class="input-row">
        <div class="input-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <rect x="5" y="11" width="14" height="10" rx="2" stroke="#6a84a0" stroke-width="1.8"/>
            <path d="M8 11 L8 7 C8 4.8 9.8 3 12 3 C14.2 3 16 4.8 16 7 L16 11" stroke="#6a84a0" stroke-width="1.8"/>
          </svg>
        </div>
        <input type="password" id="newPassword" placeholder="New Password" required>
      </div>
      
      <div class="input-row">
        <div class="input-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <rect x="5" y="11" width="14" height="10" rx="2" stroke="#6a84a0" stroke-width="1.8"/>
            <path d="M8 11 L8 7 C8 4.8 9.8 3 12 3 C14.2 3 16 4.8 16 7 L16 11" stroke="#6a84a0" stroke-width="1.8"/>
          </svg>
        </div>
        <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
      </div>
      
      <button id="setPasswordBtn">Set Password</button>
      <a href="index.html" class="back-link">← Back to Login</a>
      <div id="message" class="message"></div>
    </div>
  </main>
  
  <footer>
    <p>© 2026 Municipal Service Delivery Reporting Portal</p>
  </footer>
  
  <script type="module" src="set-password.js"></script>
</body>
</html>
