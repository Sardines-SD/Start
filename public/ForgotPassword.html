<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password - Municipal Service Portal</title>
  <link rel="stylesheet" href="styler.css">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: #5a7fa8;
      background-image: linear-gradient(rgba(60, 90, 130, 0.60), rgba(60, 90, 130, 0.60)), url('https://upload.wikimedia.org/wikipedia/commons/thumb/1/1f/Johannesburg_skyline_from_ponte.jpg/1280px-Johannesburg_skyline_from_ponte.jpg');
      background-size: cover;
      background-position: center;
    }
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    section {
      background: rgba(225, 235, 250, 0.93);
      border-radius: 12px;
      padding: 32px 40px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    h2 {
      text-align: center;
      color: #1a2a3a;
      margin-bottom: 20px;
    }
    p {
      color: #4a6a8a;
      text-align: center;
      margin-bottom: 20px;
    }
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #c8d4e0;
      box-sizing: border-box;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #2b5fa8;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover {
      background: #1e4a8a;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #2b5fa8;
      text-decoration: none;
    }
    .back-link:hover {
      text-decoration: underline;
    }
    output {
      display: block;
      margin-top: 15px;
      padding: 10px;
      border-radius: 6px;
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>
<body>
<main>
  <section>
    <h2>Reset Password</h2>
    <p>Enter your email address and we'll send you a link to reset your password.</p>

    <input type="email" id="resetEmail" placeholder="Your email address" required>
    <button onclick="sendResetEmail()">Send Password Reset Email</button>

    <a href="index.html" class="back-link">← Back to Login</a>
    <output id="resetFeedback"></output>
  </section>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { firebaseConfig } from "./firebaseConfig.js";

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  window.sendResetEmail = async function() {
    const email = document.getElementById("resetEmail").value.trim();
    const feedback = document.getElementById("resetFeedback");

    if (!email) {
      feedback.textContent = "❌ Please enter your email address.";
      feedback.style.background = "#f8d7da";
      feedback.style.borderLeftColor = "#dc3545";
      return;
    }

    feedback.textContent = "Sending...";
    feedback.style.background = "#e9f2ff";
    feedback.style.borderLeftColor = "#2b5fa8";

    try {
      await sendPasswordResetEmail(auth, email);
      feedback.textContent = "✅ Password reset email sent! Check your inbox.";
      feedback.style.background = "#d4edda";
      feedback.style.borderLeftColor = "#28a745";
    } catch (error) {
      console.error("Reset error:", error);
      const messages = {
        "auth/user-not-found": "No account found with this email address.",
        "auth/invalid-email": "Please enter a valid email address.",
        "auth/too-many-requests": "Too many requests. Please try again later."
      };
      feedback.textContent = messages[error.code] || "❌ Failed to send reset email. Please try again.";
      feedback.style.background = "#f8d7da";
      feedback.style.borderLeftColor = "#dc3545";
    }
  };
</script>
</body>
</html>
