<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <link rel="stylesheet" href="styler.css">
</head>
<body>

<header>
  <h1>Municipal Service Portal</h1>
</header>

<main>
  <section>
    <h2>Create Account</h2>

    <form id="registerForm">
        
      <label for="Username">Username (optional)</label>
      <input type="text" id ="Username" required>

      <label for="registerEmail">Email*</label>
      <input type="email" id="registerEmail" required>

        

      <label for="nativeWard">Ward*</label>
      <input type="text" id ="nativeWard" required>

      <label for="registerPassword">Password*</label>
      <input type="password" id="registerPassword" required>

      <label for="registerPasswordCornfirm">Confirm Password*</label>
      <input type="password" id="registerPasswordCornfirm" required>

      <button type="submit">Register</button>
    </form>

    <p>
      Already have an account?
      <a href="Login.html">Login here</a>
    </p>

    <output id="registerFeedback"></output>
  </section>
</main>

<footer>
  <p>&copy; 2026 Municipal Portal</p>
</footer>

<script src="register.js"></script>
</body>
</html>
